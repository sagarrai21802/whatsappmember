<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 16px;
        }
        .header {
            background: #25d366;
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        .stats {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .stats .count {
            font-size: 36px;
            font-weight: 700;
            color: #075e54;
        }
        .stats .label {
            font-size: 12px;
            color: #667781;
            margin-top: 4px;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-primary {
            background: #25d366;
            color: white;
        }
        .btn-secondary {
            background: white;
            color: #667781;
            border: 1px solid #ddd;
        }
        .btn-danger {
            background: #ffebee;
            color: #c62828;
        }
        .info {
            margin-top: 16px;
            padding: 12px;
            background: #e3f2fd;
            border-radius: 6px;
            font-size: 12px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>WhatsApp Scraper</h1>
        <p>Export group members to CSV</p>
    </div>
    
    <div class="stats">
        <div class="count" id="memberCount">0</div>
        <div class="label">members scraped</div>
    </div>
    
    <div class="actions">
        <button class="btn btn-primary" id="downloadBtn">Download CSV</button>
        <button class="btn btn-secondary" id="openWebBtn">Open WhatsApp Web</button>
        <button class="btn btn-danger" id="resetBtn">Reset Data</button>
    </div>
    
    <div class="info">
        <strong>How to use:</strong><br>
        1. Open WhatsApp Web<br>
        2. Go to a group, click "View all" members<br>
        3. Scroll to load all members<br>
        4. Click Download CSV
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
